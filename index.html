exp:“A <strong>disclaimer of opinion</strong> is the most extreme audit outcome. It is issued when auditors are unable to obtain sufficient appropriate evidence — perhaps because management refused access, records were destroyed, or uncertainties are so extreme that no reliable opinion can be formed. It signals fundamental problems with the audit.”},

{topic:“fraud”,group:“Fraud, Ethics & Accountability”,
q:“An adverse audit opinion differs from a qualified opinion in what key respect?”,
opts:[“A qualified opinion relates only to cash; adverse covers all statements”,“An adverse opinion is issued when issues are limited and specific; qualified when issues are pervasive”,“A qualified opinion says "except for" specific issues the accounts are fair; an adverse opinion says the accounts as a whole do NOT give a true and fair view”,“There is no practical difference between the two opinions”],ans:2,
exp:”<strong>Qualified opinion</strong>: "Except for the matter described, the financial statements give a true and fair view." — the misstatement is material but not pervasive. <strong>Adverse opinion</strong>: the misstatements are so <strong>pervasive</strong> that the financial statements as a whole do not give a true and fair view. An adverse opinion is far more serious.”},

{topic:“fraud”,group:“Fraud, Ethics & Accountability”,
q:”"Rationalisation" in the context of the Fraud Triangle means:”,
opts:[“The fraudster calculates the expected financial gain from the fraud”,“The fraudster constructs a psychological justification that makes the fraud feel morally acceptable to themselves”,“A detective’s process for reconstructing how a fraud was committed”,“The mathematical analysis used to detect fraudulent transactions”],ans:1,
exp:”<strong>Rationalisation</strong> is the psychological self-justification that allows a fraudster to reconcile dishonest behaviour with their self-image as a decent person. Common rationalisations: "The company owes me after all I’ve done", "I’ll pay it back before anyone notices", "Everyone in this industry does this." Removing opportunity is more effective than trying to change rationalisation.”},

{topic:“fraud”,group:“Fraud, Ethics & Accountability”,
q:“The primary purpose of an external financial audit is:”,
opts:[“To prepare the company’s financial statements on management’s behalf”,“To certify that the company is financially stable and will not fail”,“To provide independent assurance that financial statements present a true and fair view in accordance with applicable accounting standards”,“To advise management on improving internal controls only”],ans:2,
exp:“An <strong>external audit</strong> provides an independent opinion — not a guarantee — that financial statements are free from material misstatement (due to error or fraud) and comply with accounting standards. Auditors do not prepare accounts (that is management’s job) and do not certify financial health.”},

{topic:“fraud”,group:“Fraud, Ethics & Accountability”,
q:“Which combination of internal controls most effectively prevents a single employee from committing and concealing financial fraud?”,
opts:[“A single trusted senior employee overseeing all financial approvals”,“Verbal-only authorisation to speed up payment processes”,“Segregation of duties combined with independent reconciliations and management review”,“Reducing the number of financial records maintained”],ans:2,
exp:“The most effective fraud prevention combines: <strong>(1) Segregation of duties</strong> — different people authorise, record, and handle cash; <strong>(2) Independent reconciliations</strong> — bank statements checked against ledgers by someone not involved in transactions; <strong>(3) Management review</strong> — oversight that makes unusual patterns visible.”},

{topic:“fraud”,group:“Fraud, Ethics & Accountability”,
q:“In a major UK corporate fraud case, a Finance Director created fictitious bank statements showing cash balances the company did not have. The external auditors accepted these documents without independently verifying balances with the banks. Using the concept of the accountability chain, which two links failed?”,
opts:[“Preparation and Disclosure — the FD prepared false data and it was wrongly disclosed in the accounts”,“Legal Duty and Audit — the FD breached their legal duty to prepare accurate records, and the audit failed by not independently verifying the evidence”,“Consequences and Enforcement — regulators failed to investigate quickly enough”,“Shareholders and Management — shareholders failed to scrutinise management adequately”],ans:1,
exp:“The <strong>accountability chain</strong> runs from preparation through disclosure, audit, legal duty, and consequences. Here: <strong>Legal duty failed</strong> — the FD had a legal obligation to prepare accurate accounts but deliberately falsified them; <strong>Audit failed</strong> — the auditor accepted management’s documents without independent bank confirmation, a fundamental audit procedure.”},

// ══════════════════════════════════════════════════
// GROUP 7 · FINTECH & DIGITAL FINANCE (111–125)
// ══════════════════════════════════════════════════
{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“A technology startup claims its payment record system is "unhackable" because records are simultaneously stored and verified across thousands of independent computers globally, with no single organisation controlling the ledger. Which technology underpins this architecture?”,
opts:[“A centralised cloud server with strong encryption”,“Blockchain — a distributed ledger maintained across multiple independent nodes with no single point of control”,“Traditional relational database technology with multi-factor authentication”,“A government-managed digital registry”],ans:1,
exp:”<strong>Blockchain</strong> is a distributed ledger where copies of the transaction record are maintained simultaneously across a network of independent nodes. Because no single party controls the ledger, altering records would require consensus from the majority of the network — making manipulation extremely difficult.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“In 2023, an investigator attempts to alter a 2020 transaction on a blockchain network. Despite gaining access to one computer in the network, the alteration is automatically rejected. Which specific blockchain property prevented the change?”,
opts:[“Encryption of individual transaction files”,“Immutability — once validated, blockchain records are cryptographically linked to all subsequent blocks, making retrospective changes detectable and rejectable by the network”,“Centralised admin controls that prevent external editing”,“The absence of an internet connection on that particular node”],ans:1,
exp:”<strong>Immutability</strong> means that once a transaction is recorded and validated, it is permanently embedded. Each new block contains a cryptographic hash of the previous block — altering an old transaction would change its hash, breaking the chain and alerting the entire network. This makes blockchain records extremely tamper-resistant.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“A retired teacher lends £8,000 of her savings to a small bakery business through an online platform that matched them based on her risk appetite and the bakery’s credit profile. She earns 6.5% annual interest. The platform never held her money in a bank account. Which financial model describes this transaction?”,
opts:[“Traditional bank intermediation”,“Equity crowdfunding — she now owns shares in the bakery”,“Peer-to-peer (P2P) lending — direct lending between individuals via a digital matching platform”,“Invoice financing — using the bakery’s invoices as collateral”],ans:2,
exp:”<strong>P2P (peer-to-peer) lending</strong> connects individual lenders directly with borrowers through a digital platform — no bank intermediary takes a deposit or re-lends the money. The platform acts as a marketplace, handling matching and administrative functions while the lender bears the credit risk.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“A restaurant group needs growth capital but does not want to borrow from a bank or dilute existing shareholders with new equity. Instead, it issues a 4-year bond at 7% annual interest to institutional investors. What is the KEY financial risk this approach introduces compared to equity financing?”,
opts:[“The restaurant loses ownership control completely”,“Investors can demand repayment at any time without notice”,“A fixed interest obligation is created — 7% must be paid annually regardless of whether the business is profitable”,“The bond automatically converts to equity if profits fall”],ans:2,
exp:“Unlike equity (which has no mandatory payments), a bond creates a <strong>fixed interest obligation</strong> that must be paid regardless of trading performance. If the restaurant has a poor year, it must still pay 7% interest. This is the fundamental financial risk difference between debt and equity financing.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“A loan agreement stored on a blockchain automatically releases funds to a borrower the moment they upload verified proof of the required insurance certificate. No human approval is needed. What type of technology is enabling this automated execution?”,
opts:[“Telematics underwriting”,“Manual ledger reconciliation”,“Buy Now Pay Later (BNPL) processing”,“A smart contract — self-executing code that runs automatically when predefined conditions are met”],ans:3,
exp:”<strong>Smart contracts</strong> are programs stored on a blockchain that automatically execute agreed actions when specified conditions are satisfied — without any human intermediary. In this example, proof of insurance = the condition; fund release = the automatic execution. They reduce delay, cost, and counterparty risk.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“A young borrower with no formal credit history but a consistent record of managing a profitable online business through digital transactions applies for a loan. A traditional bank declines; a FinTech lender approves within hours. What MOST likely explains the difference?”,
opts:[“FinTech lenders do not conduct any credit assessment”,“FinTech lenders are not legally required to assess creditworthiness”,“FinTech lenders use alternative data (digital transaction history, business performance data, online reviews) and algorithmic assessment — rather than traditional credit scores alone — to evaluate creditworthiness”,“FinTech lenders charge higher interest rates to compensate for not assessing risk”],ans:2,
exp:”<strong>P2P and FinTech lenders use alternative data</strong> — digital transaction history, cash flow patterns, platform performance data — alongside machine learning algorithms. This enables credit decisions for borrowers who are "thin-file" in traditional systems but demonstrably creditworthy through their digital footprint.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“A user opens a personal finance app and can see all their current accounts, savings, credit cards, and mortgage in one dashboard. The app connected to their banks automatically using secure, authorised programming interfaces — the user did not share passwords. Which UK framework made this possible?”,
opts:[“GDPR — data protection regulation requiring consent”,“Basel III — international banking capital standards”,“Open Banking — a regulatory framework enabling authorised third parties to access financial data via secure APIs with explicit customer consent”,“Anti-money laundering (AML) regulations requiring data sharing”],ans:2,
exp:”<strong>Open Banking</strong> (implemented under the Payment Services Directive 2 in the UK) allows regulated third-party providers to access customer account data via <strong>secure APIs</strong>, with the customer’s <strong>explicit consent</strong>. This enabled the aggregation, budgeting, and payment initiation services now widely available through FinTech apps.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“Before digital finance platforms, entrepreneurs in rural areas or from non-traditional backgrounds frequently struggled to access growth capital because local banks applied conservative criteria and venture capital was inaccessible. Which characteristic of collaborative finance platforms MOST directly addresses this historical barrier?”,
opts:[“Collaborative platforms guarantee loan approval for all applicants”,“They require less collateral than traditional banks because they don’t assess credit risk”,“They significantly lower barriers to accessing capital by connecting entrepreneurs with large pools of investors nationwide, regardless of geography”,“They provide free financial advice alongside funding”],ans:2,
exp:”<strong>Collaborative finance platforms democratise access to capital</strong>. By connecting entrepreneurs with thousands of potential investors via digital channels, they remove the geographical constraints and gatekeeping of traditional banking — enabling businesses that would previously have been rejected to access funding from dispersed sources.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“Buy Now Pay Later (BNPL) services allow consumers to purchase goods immediately and pay in instalments. Which regulatory concern has driven increased FCA scrutiny of BNPL products?”,
opts:[“BNPL causes inflation by increasing consumer spending”,“BNPL eliminates competition from traditional credit card providers”,“Some BNPL users accumulate debt without fully understanding the financial commitment, creating consumer harm risk”,“BNPL providers evade all financial regulation by calling themselves technology companies”],ans:2,
exp:“The FCA has moved to regulate BNPL more strictly because <strong>consumers sometimes do not fully understand the credit obligation they are entering</strong> — particularly younger users. Missed payments can result in debt, damage to credit scores, and collection action. Consumer protection from harm is the primary regulatory concern.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“What is the single most important technological enabler that has allowed financial services to shift from a branch-based, intermediary-led model to a platform-based, peer-to-peer model?”,
opts:[“The introduction of the ATM in the 1960s”,“Physical proximity of customers to financial institutions”,“Digital connectivity — the internet, mobile technology, and secure API infrastructure — enabling scalable, low-cost financial services without physical presence”,“Government deregulation of banking in the 1980s”],ans:2,
exp:”<strong>Digital technology</strong> — particularly the internet, smartphones, cloud computing, and secure APIs — is the foundational enabler. It allows financial platforms to serve millions of customers simultaneously without physical branches, match borrowers with lenders in real time, and process transactions at near-zero marginal cost.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“A company builds an AI-powered robo-adviser that automatically allocates retail customers’ savings into investment portfolios based on their risk profile, rebalancing automatically each week. What regulatory status would this company almost certainly need in the UK?”,
opts:[“No authorisation is needed as the service is automated”,“HMRC registration as a financial intermediary”,“Companies House registration only”,“FCA authorisation — providing investment advice and managing client money are regulated activities regardless of whether they are performed by a human or an algorithm”],ans:3,
exp:”<strong>Investment advice and portfolio management are regulated activities</strong> under FSMA 2000. The FCA regulates based on the <strong>activity performed</strong>, not who (or what) performs it. An automated robo-adviser performs the same regulated function as a human IFA — it requires the same FCA authorisation.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“A sole trader with limited credit history approaches a traditional bank for a £20,000 business loan and is declined. She then applies through a P2P business lending platform and receives approval within 48 hours. What MOST likely explains the faster, more flexible outcome?”,
opts:[“P2P platforms do not assess creditworthiness and therefore approve everyone”,“P2P platforms are legally exempt from responsible lending obligations”,“P2P platforms use algorithmic assessment of alternative data — business transaction history, cash flows, online presence — rather than relying solely on traditional credit files and collateral requirements”,“P2P platforms charge no interest and therefore have nothing to lose from approving any loan”],ans:2,
exp:“P2P lending platforms use <strong>algorithmic credit assessment and alternative data sources</strong> (bank transaction patterns, business performance, digital footprint) to make faster, more nuanced credit decisions. This allows them to approve creditworthy borrowers who are poorly served by traditional credit scoring systems that focus on historical credit files and collateral.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“A finance team of 25 people currently uses spreadsheets emailed between departments for monthly management accounts. Version control errors, data duplication, and a 3-week close process are causing significant problems. Which technology solution most directly addresses these specific issues?”,
opts:[“Installing faster computers for each team member”,“Hiring more accountants to reconcile the spreadsheets”,“Implementing a cloud-based financial management platform with centralised, real-time data accessible to all authorised users simultaneously”,“Switching from monthly to quarterly reporting to reduce workload”],ans:2,
exp:“A <strong>cloud-based financial management system</strong> (e.g. a cloud ERP) centralises data in a single authoritative source, eliminates version control problems, enables simultaneous multi-user access, and automates consolidation — directly addressing all the problems described and significantly reducing close time.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“After deploying robotic process automation (RPA) for invoice processing, a company’s accounts payable team reduces processing time from 6 days to 4 hours and reduces error rates by 92%. Which primary category of operational benefit does this demonstrate?”,
opts:[“Strategic benefit — better market positioning”,“Revenue benefit — higher sales through faster processing”,“Efficiency and accuracy improvement — reduced processing time and error rates in high-volume repetitive tasks”,“Governance benefit — stronger board oversight of payments”],ans:2,
exp:”<strong>Automation of repetitive, rules-based processes</strong> like invoice processing produces two primary benefits: <strong>speed</strong> (6 days → 4 hours) and <strong>accuracy</strong> (92% error reduction). This frees human finance staff for higher-value analytical work while reducing operational cost and risk of error.”},

{topic:“fintech”,group:“FinTech & Digital Finance”,
q:“InsurTech refers to:”,
opts:[“Traditional insurance products sold through Lloyd’s of London brokers”,“Government-mandated insurance schemes such as National Insurance”,“Technology-driven innovation in the insurance industry — using AI, telematics, and data analytics to improve pricing, underwriting, and claims processing”,“International standards for insurance company capital requirements”],ans:2,
exp:”<strong>InsurTech</strong> (Insurance + Technology) describes technology-driven innovation in the insurance sector. Examples include: telematics (usage-based car insurance), AI claims processing, parametric insurance (automatic payout when a predefined event occurs), and digital-only insurance platforms — all disrupting traditional insurance models.”},

{topic:“data”,group:“Financial Data Sources & Credibility”,
q:“A company’s published and audited annual report and accounts is best classified as which type of financial data source?”,
opts:[“Secondary data — because other parties will use it”,“Tertiary data — because it aggregates multiple reports”,“Primary data — it is the original, first-hand report produced directly by the company”,“Qualitative data — because it contains narrative sections”],ans:2,
exp:“A <strong>primary source</strong> is an original, first-hand source produced directly by the reporting entity. A company’s own annual report, its regulatory filings (e.g. SEC 10-K), and its stock exchange announcements are all primary sources — not interpreted or processed by a third party.”},

{topic:“data”,group:“Financial Data Sources & Credibility”,
q:“An investment bank publishes a research note analysing a company’s financial results, comparing them to sector peers and projecting future earnings. This is best classified as:”,
opts:[“A primary source — it is produced by finance professionals”,“Regulatory data — it is filed with the FCA”,“Secondary data — it interprets and adds analysis to primary financial data”,“Quantitative-only data since it contains financial projections”],ans:2,
exp:“Investment bank research notes, Financial Times articles, and Bloomberg market summaries are <strong>secondary sources</strong> — they take primary data (company filings, results announcements) and interpret, analyse, or repackage it. They may be authoritative but they are one step removed from the original source.”},

{topic:“data”,group:“Financial Data Sources & Credibility”,
q:“An analyst is choosing between two sources of information about the same company: (A) the company’s most recent audited annual report; (B) a post on a financial social media forum claiming inside knowledge. Which is more credible, and on what basis?”,
opts:[“B — social media often breaks news faster than formal reports”,“They are equally credible if the information is the same”,“A — audited annual reports have been independently verified by a qualified auditor against accounting standards; they carry the highest level of assurance”,“B — anonymous posts are less likely to be biased by management spin”],ans:2,
exp:”<strong>Audited financial statements</strong> carry the highest credibility because: they are prepared under accounting standards, they have been independently verified by a qualified auditor, and they are filed with regulators. An auditor’s opinion provides structured, professional assurance. Social media posts have no verification mechanism.”},

{topic:“data”,group:“Financial Data Sources & Credibility”,
q:“An analyst uses Bloomberg and Refinitiv to obtain EPS figures for the same company. The two databases show slightly different EPS values for the same reporting period. What is the MOST likely explanation?”,
opts:[“One database has made a factual error and should be reported”,“EPS is entirely subjective and varies based on the analyst’s view”,“Data vendors may apply different definitional adjustments (e.g. basic vs diluted EPS, different exceptional item treatments) or have different data update cycles”,“EPS is too complex to calculate reliably from company reports”],ans:2,
exp:“Different data providers may use slightly different <strong>EPS definitions</strong> (basic vs diluted), treat exceptional items differently, or update at different times in the reporting cycle. Neither figure is necessarily "wrong" — analysts should understand the methodology behind the data they use and apply it consistently.”},

{topic:“data”,group:“Financial Data Sources & Credibility”,
q:“An analyst receives an anonymous email containing a spreadsheet that purportedly shows significant off-balance-sheet liabilities at a major company not disclosed in its filed accounts. What is the MOST important first action before using this data in a research note?”,
opts:[“Immediately publish the findings to alert the market”,“Assume it is accurate as it comes from an anonymous insider”,“Verify the source and cross-reference with official primary sources (company filings, Companies House records, regulatory announcements) before drawing any conclusions”,“Calculate ratios from the spreadsheet to add credibility”],ans:2,
exp:”<strong>Source verification</strong> is always the first step in data validation. Anonymous tips may be genuine whistleblowing or deliberate misinformation (e.g. to manipulate the share price). The analyst must cross-reference with verifiable primary sources before acting — publishing unverified claims could constitute market abuse.”},

{topic:“data”,group:“Financial Data Sources & Credibility”,
q:“A company’s Annual Report contains: (A) audited income statement, balance sheet and cash flow statement; (B) management’s strategic narrative discussion; (C) the independent auditor’s report. Which combination represents qualitative data?”,
opts:[“A only — all financial statements are qualitative”,“B only — the strategic narrative is qualitative”,“B and C — both are descriptive, non-numerical content”,“A, B and C — all annual report content is qualitative”],ans:2,
exp:”<strong>Qualitative data</strong> is descriptive and non-numerical. The management narrative (discussing strategy, markets, risks) and the auditor’s report (expressing an opinion in words) are qualitative. The financial statements (A) are quantitative — they present numerical data.”},

{topic:“data”,group:“Financial Data Sources & Credibility”,
q:“Which of the following is an example of quantitative financial data?”,
opts:[“The CEO’s letter to shareholders discussing market conditions”,“A risk committee’s narrative assessment of cybersecurity threats”,“The company’s dividend yield of 3.8%”,“An auditor’s emphasis-of-matter paragraph explaining accounting treatment”],ans:2,
exp:”<strong>Quantitative data</strong> is numerical and measurable. A dividend yield of 3.8% is a numerical ratio — quantitative. CEO letters, risk assessments, and auditor narratives are descriptive — qualitative. Both types are important for comprehensive financial analysis.”},

{topic:“data”,group:“Financial Data Sources & Credibility”,
q:“A company’s Form 10-K filing with the US Securities and Exchange Commission (SEC) is best described as:”,
opts:[“A secondary source analysing the company from outside”,“An internal management report not available to the public”,“A primary source — the company’s own mandatory annual regulatory filing”,“A tertiary source aggregating multiple company disclosures”],ans:2,
exp:“A <strong>Form 10-K</strong> is the annual report that US-listed companies must file directly with the SEC. Like a UK annual report filed at Companies House, it is an <strong>original, first-hand primary source</strong> — the company itself produces and files it under legal obligation.”},

{topic:“data”,group:“Financial Data Sources & Credibility”,
q:“Two analysts write independent reports on the same company’s financial health. Report A is based on the company’s audited annual accounts. Report B is based entirely on a rival’s anonymous blog post. On what basis does Report A carry greater credibility?”,
opts:[“Report A is longer and contains more data”,“Report A comes from an audited primary source independently verified by qualified professionals; Report B’s underlying data has no verification or accountability”,“Report B is more current as blogs update faster”,“Both reports are equally credible because they reach different audiences”],ans:1,
exp:“Credibility in financial data depends primarily on the <strong>source’s independence, verifiability, and professional accountability</strong>. Audited accounts have been examined by independent qualified auditors under professional standards. Anonymous blog posts have no accountability, no verification, and no standards to meet — making them inherently unreliable as a sole source.”},

{topic:“data”,group:“Financial Data Sources & Credibility”,
q:“A company’s financial ratios show strong and improving performance across all key metrics. However, qualitative investigation reveals: the CEO resigned unexpectedly last month, a top-10 client has just cancelled its contract, and a regulatory investigation has been announced. What does this scenario demonstrate about financial analysis?”,
opts:[“Ratio analysis is the only reliable analytical tool — qualitative factors are speculation”,“The company is clearly financially healthy based on its ratios”,“Quantitative analysis alone can be dangerously misleading — qualitative factors represent material risks that will likely appear in future financial results”,“The CEO’s departure and contract loss are irrelevant to financial performance”],ans:2,
exp:“This scenario demonstrates the essential role of <strong>qualitative analysis</strong> as a complement to ratio analysis. Current ratios reflect historical performance; qualitative factors — leadership changes, client losses, regulatory risk — are leading indicators of future financial deterioration. A comprehensive analyst considers both.”},

// ══════════════════════════════════════════════════
// GROUP 9 · ACCOUNTING STANDARDS & FRAMEWORKS (136–145)
// ══════════════════════════════════════════════════
{topic:“standards”,group:“Accounting Standards & Frameworks”,
q:“Horizon Manufacturing Ltd is a UK private company with annual turnover of £14 million, 175 employees, and shares held entirely by its founding family — it has no stock exchange listing. Which accounting framework most likely applies to its financial statements?”,
opts:[“IFRS — as it operates internationally”,“FRS 105 — the micro-entity standard”,“UK-adopted IFRS — required for all large UK companies”,“FRS 102 — the UK GAAP standard for medium and large private UK companies not listed on a stock exchange”],ans:3,
exp:”<strong>FRS 102</strong> is the UK Generally Accepted Accounting Practice standard that applies to medium and large <strong>private companies not listed on a public market</strong>. Listed companies use UK-adopted IFRS; micro-entities use FRS 105; SMEs may use FRS 102 reduced disclosure. Horizon is a classic FRS 102 entity.”},

{topic:“standards”,group:“Accounting Standards & Frameworks”,
q:“A UK company lists its shares on the London Stock Exchange, making it publicly accountable to thousands of shareholders and institutional investors. Which accounting framework must it use for its consolidated financial statements?”,
opts:[“FRS 102 — standard UK GAAP”,“FRS 105 — simplified micro-entity reporting”,“US GAAP — as international investors require it”,“UK-adopted International Financial Reporting Standards (IFRS)”],ans:3,
exp:“Listed companies on UK public markets (including AIM and LSE) are required to prepare consolidated financial statements using <strong>UK-adopted IFRS</strong>. This ensures that investors — including international fund managers — can compare companies using a consistent global standard.”},

{topic:“standards”,group:“Accounting Standards & Frameworks”,
q:“The Companies Act 2006 is described as the "legal backbone" of UK financial reporting. Which of the following is NOT one of its primary obligations for companies?”,
opts:[“Maintaining accurate accounting records”,“Preparing annual financial statements”,“Filing accounts at Companies House”,“Setting specific accounting standards and measurement rules for all items”],ans:3,
exp:“The <strong>Companies Act 2006</strong> sets legal obligations for company reporting, record-keeping, and filing — but it does not itself prescribe specific accounting measurements. That is done by <strong>accounting standards</strong> (FRS 102, IFRS). The Act provides the legal framework; standards provide the technical rules.”},

{topic:“standards”,group:“Accounting Standards & Frameworks”,
q:“A UK listed company’s finance director says: "Now that the IASB has issued a new IFRS standard, we must adopt it immediately." Is this correct post-Brexit?”,
opts:[“Yes — all new IFRS standards automatically apply to UK listed companies from their IASB effective date”,“Yes — Brexit had no impact on IFRS adoption in the UK”,“No — new IFRS standards must first be assessed and formally endorsed by the UK Endorsement Board before they are effective in the UK”,“No — the UK has abandoned IFRS entirely and only uses FRS 102”],ans:2,
exp:“Post-Brexit, the UK has its own <strong>UK Endorsement Board (UKEB)</strong>. New IFRS standards from the IASB must be reviewed and formally endorsed by the UKEB before they become effective in the UK. The UK may endorse with modifications or delay adoption — meaning UK-adopted IFRS can diverge from global IFRS.”},

{topic:“standards”,group:“Accounting Standards & Frameworks”,
q:“IFRS standards are primarily designed for which category of reporting entity?”,
opts:[“Sole traders and partnerships in all countries”,“Micro-entities with simplified reporting needs”,“Government departments and public sector bodies”,“Publicly listed companies and other entities with public accountability to capital markets”],ans:3,
exp:”<strong>IFRS</strong> is designed for entities with public accountability — primarily listed companies whose financial statements are used by a broad international investor base. The transparency and comparability requirements of IFRS reflect the needs of global capital markets, where investors compare companies across borders.”},

{topic:“standards”,group:“Accounting Standards & Frameworks”,
q:“FRS 105 — the micro-entity regime — applies to companies that meet which criteria?”,
opts:[“Any UK company that chooses simplified reporting”,“Companies with turnover above £10.2 million”,“Only companies registered in England and Wales”,“Very small UK companies that meet specific size thresholds including turnover typically below £632,000 and balance sheet below £316,000”],ans:3,
exp:”<strong>FRS 105</strong> is available only to <strong>micro-entities</strong> — the very smallest companies meeting strict size criteria. It offers significantly simplified reporting, including a reduced balance sheet and no requirement for a directors’ report. Most companies are too large to qualify and must use FRS 102 or IFRS.”},

{topic:“standards”,group:“Accounting Standards & Frameworks”,
q:“Why are standardised accounting frameworks (like IFRS and FRS 102) important for investors and analysts?”,
opts:[“They allow each company to choose its preferred accounting policies freely”,“They guarantee that companies will be profitable if followed correctly”,“They ensure financial statements are prepared on a consistent basis, enabling meaningful comparison across companies and time periods”,“They replace the need for independent audit”],ans:2,
exp:”<strong>Comparability and consistency</strong> are the core benefits of standardised frameworks. When all companies measure and report items using the same rules, analysts can meaningfully compare ratios, trends, and performance across companies, sectors, and years — without worrying that differences are simply due to different accounting policies.”},

{topic:“standards”,group:“Accounting Standards & Frameworks”,
q:“Which independent global body develops and issues International Financial Reporting Standards (IFRS)?”,
opts:[“The Financial Conduct Authority (FCA)”,“Companies House”,“The Office for National Statistics (ONS)”,“The International Accounting Standards Board (IASB)”],ans:3,
exp:“The <strong>IASB (International Accounting Standards Board)</strong>, based in London, is the independent body responsible for developing IFRS standards used by over 140 countries. The IASB is overseen by the IFRS Foundation and consults widely with stakeholders globally before issuing new or amended standards.”},

{topic:“standards”,group:“Accounting Standards & Frameworks”,
q:“Under the Companies Act 2006, which companies are exempt from the requirement for a statutory external audit?”,
opts:[“All private companies regardless of size”,“Any company that has been trading for less than 3 years”,“Small companies that meet specific size thresholds (and are not otherwise required to be audited e.g. by their constitution or banking covenants)”,“Only companies registered outside the UK”],ans:2,
exp:“The Companies Act 2006 provides an <strong>audit exemption for small companies</strong> meeting specific size criteria (turnover below £10.2m, balance sheet below £5.1m, fewer than 50 employees). Large companies, public companies, and subsidiaries of larger groups are generally required to have a statutory audit regardless.”},

{topic:“standards”,group:“Accounting Standards & Frameworks”,
q:“A company’s auditor raises doubts about whether the going concern assumption remains appropriate after finding that the company has been unable to pay several large invoices and its main lender is reviewing the loan facility. What is the accounting implication if going concern is no longer appropriate?”,
opts:[“No change is required — accounts are always prepared on a going concern basis”,“The company must switch to preparing accounts on a break-up (liquidation) basis, valuing assets at what they would realise in a forced sale, and this must be disclosed prominently”,“The auditor must resign immediately”,“The company must move to cash accounting immediately”],ans:1,
exp:“If the going concern basis cannot be justified, financial statements must be prepared on a <strong>break-up basis</strong> — assets are valued at their estimated realisable value in a forced sale (often much lower than carrying value), and all liabilities become immediately due. This change, and the material uncertainty, must be <strong>disclosed clearly</strong> in the financial statements and auditor’s report.”},

// ══════════════════════════════════════════════════
// GROUP 10 · MIXED APPLICATION SCENARIOS (146–150)
// ══════════════════════════════════════════════════
{topic:“mixed”,group:“Mixed Application Scenarios”,
q:“Oakfield Retail plc reports £3.2 million net profit for the year. Three months later, it files for administration. An investigation reveals: trade receivables had doubled (customers not paying), inventory had grown by 60% (stock not selling), and short-term borrowings had trebled. Which financial analysis could have flagged this risk BEFORE administration?”,
opts:[“The income statement alone would have shown the crisis clearly”,“A P&L ratio analysis showing improving gross margins”,“Analysis of the cash flow statement alongside working capital ratios (current ratio, acid test, debtor days, stock turnover) — which would have revealed severe cash absorption despite reported profits”,“ESG analysis of the company’s governance practices”],ans:2,
exp:“This is a classic <strong>overtrading/working capital crisis</strong> — profitable but cash-starved. The <strong>cash flow statement</strong> would have shown negative operating cash flow despite profits. <strong>Working capital ratios</strong> (rising debtor days, falling stock turnover, declining current ratio) would have provided early warning signals well before administration.”},

{topic:“mixed”,group:“Mixed Application Scenarios”,
q:“A credit analyst is assessing a company’s ability to repay a proposed £5 million 8-year loan. Which combination of sources provides the most robust assessment of long-term solvency?”,
opts:[“The company’s Instagram profile and news headlines”,“The income statement alone — profitability is the only metric that matters for loan repayment”,“The balance sheet combined with the notes disclosing debt terms, covenants, and maturity profile”,“A single analyst’s blog post reviewing the company’s management team”],ans:2,
exp:“Long-term solvency assessment requires: the <strong>balance sheet</strong> (to see total assets vs total liabilities and existing debt levels) + the <strong>notes</strong> (to understand debt maturity, interest rates, covenants, contingent liabilities, and any off-balance-sheet obligations). Together, these provide the most authoritative and complete picture.”},

{topic:“mixed”,group:“Mixed Application Scenarios”,
q:“Two competing companies report identical net profits of £4 million. Company A is funded 80% by equity and 20% by debt. Company B is funded 30% by equity and 70% by debt. Despite identical profits, why does Company B carry significantly higher financial risk?”,
opts:[“Company B has more customers and therefore more operational complexity”,“Identical profits make the companies equally risky by definition”,“Company B’s high debt creates large fixed interest payments that must be met even in poor trading years — if profits fell significantly, Company B might struggle to service its debt while Company A would be less affected”,“Company A is more risky because equity investors have higher return expectations”],ans:2,
exp:”<strong>Financial risk is driven by leverage</strong>, not just profit level. Company B’s heavy reliance on debt (70%) means large fixed interest payments. If market conditions deteriorate and profits fall, Company B must still pay its interest — whereas Company A, with minimal debt, has much greater financial flexibility. Same profit, very different risk profile.”},

{topic:“mixed”,group:“Mixed Application Scenarios”,
q:“A manufacturing company invests £8 million in a complete ERP system upgrade. In the year following implementation, revenue is unchanged, but balance sheet assets have increased significantly and the income statement shows an increase in depreciation and amortisation charges. A shareholder is concerned the company is "going backwards." What is the most likely accurate explanation?”,
opts:[“The investment was a mistake and has destroyed shareholder value”,“Revenue must be declining due to the disruption caused by the new system”,“The £8 million ERP investment has been capitalised as a non-current asset and is being amortised — revenue benefits (efficiency gains, cost savings, capacity increases) are expected to materialise in future periods, not immediately”,“The income statement contains errors that should be reported to auditors”],ans:2,
exp:“Large technology investments are typically <strong>capitalised as intangible assets</strong> and amortised over their useful life. The balance sheet grows (asset added); the income statement shows amortisation charges. Revenue benefits from improved efficiency usually emerge gradually over subsequent years — not immediately. This is normal capital investment accounting under the matching principle.”},

{topic:“mixed”,group:“Mixed Application Scenarios”,
q:“A private equity firm is conducting due diligence on a target acquisition. The target’s income statement shows 4 years of strong revenue and profit growth. However: (1) the cash flow statement shows declining operating cash flow; (2) the balance sheet shows rapidly increasing trade receivables and inventory; (3) the notes reveal a material contingent liability from a pending regulatory investigation; (4) qualitative research reveals the founding management team has just resigned. What is the correct analytical conclusion?”,
opts:[“The income statement growth trend confirms this is an excellent acquisition at any price”,“The target is clearly a strong performer — one cash flow year should not affect the decision”,“A holistic analysis reveals significant red flags: profit quality is low (cash not following profit), hidden risks exist (contingent liability, balance sheet deterioration), and leadership risk is material — due diligence must probe these issues deeply before any offer is made”,“The only issue is the management team — which can easily be replaced post-acquisition”],ans:2,
exp:“This scenario requires <strong>holistic, integrated financial analysis</strong>: (1) Income statement growth looks strong but (2) cash flow divergence signals profit quality issues; (3) balance sheet deterioration signals working capital pressure; (4) the contingent liability represents an unquantified but potentially material risk; (5) management departure is a serious qualitative red flag. Relying on the income statement alone would be dangerously misleading — this is exactly why all three statements AND qualitative analysis must be integrated.”},
];

// ── STATE ──
let answered=0, correct=0;
const revealed=new Set();
const userAnswers={};
let currentFilter=“all”;

// ── RENDER ──
function render(filter){
const main=document.getElementById(“main-content”);
// keep summary node
const sumNode=document.getElementById(“summary”);
main.innerHTML=””;

let groups={}, order=[];
QUESTIONS.forEach((q,i)=>{
if(filter!==“all”&&q.topic!==filter) return;
if(!groups[q.group]){groups[q.group]=[];order.push(q.group);}
groups[q.group].push({q,i});
});

order.forEach(grp=>{
const hdr=document.createElement(“div”);
hdr.className=“topic-header”;
hdr.innerHTML=`<h2>${grp}</h2><div class="topic-line"></div><span class="topic-count">${groups[grp].length}q</span>`;
main.appendChild(hdr);
groups[grp].forEach(({q,i})=>main.appendChild(buildCard(q,i)));
});

if(filter===“all”||filter===currentFilter){
if(sumNode) main.appendChild(sumNode);
}
updateBar();
}

function buildCard(q,i){
const card=document.createElement(“div”);
const rev=revealed.has(i);
card.className=“q-card”+(rev?(userAnswers[i]===q.ans?” answered-correct”:” answered-wrong”):””);
card.id=“qcard-”+i;
const letters=[“A”,“B”,“C”,“D”];
const opts=q.opts.map((o,oi)=>{
let cls=“opt-btn”;
if(rev){
if(oi===q.ans)cls+=” correct”;
else if(oi===userAnswers[i])cls+=” wrong”;
}
return `<button class="${cls}" onclick="selectOpt(${i},${oi})" ${rev?'disabled':''}><span class="opt-letter">${letters[oi]}</span><span>${o}</span></button>`;
}).join(””);
const fbCls=rev?(userAnswers[i]===q.ans?“correct-fb”:“wrong-fb”):””;
const fbTxt=rev?(userAnswers[i]===q.ans?“✓ Correct”:“✗ Incorrect — correct answer highlighted”):””;
card.innerHTML=` <div class="q-head"><span class="q-num">Q${i+1}</span><span class="q-text">${q.q}</span></div> <div class="q-options">${opts}</div> <div class="q-feedback ${fbCls} ${rev?'show':''}">${fbTxt}</div> <div class="explanation ${rev?'show':''}"><div class="exp-label">Explanation</div><div class="exp-text">${q.exp}</div></div>`;
return card;
}

function selectOpt(qi,oi){
if(revealed.has(qi))return;
const q=QUESTIONS[qi];
userAnswers[qi]=oi;
revealed.add(qi);
answered++;
if(oi===q.ans)correct++;
updateBar();
const card=document.getElementById(“qcard-”+qi);
if(!card)return;
card.className=“q-card”+(oi===q.ans?” answered-correct”:” answered-wrong”);
card.querySelectorAll(”.opt-btn”).forEach((btn,idx)=>{
btn.disabled=true;
if(idx===q.ans)btn.className=“opt-btn correct”;
else if(idx===oi)btn.className=“opt-btn wrong”;
});
const fb=card.querySelector(”.q-feedback”);
fb.className=“q-feedback “+(oi===q.ans?“correct-fb”:“wrong-fb”)+” show”;
fb.textContent=oi===q.ans?“✓ Correct”:“✗ Incorrect — correct answer highlighted”;
card.querySelector(”.explanation”).className=“explanation show”;

if(answered===QUESTIONS.length){
const sum=document.getElementById(“summary”);
if(sum){
sum.style.display=“block”;
const pct=Math.round(correct/QUESTIONS.length*100);
sum.querySelector(”.final-score”).textContent=correct+” / “+QUESTIONS.length;
sum.querySelector(”.grade-msg”).textContent=
pct>=70?“🎓 Excellent — you are well above the pass threshold!”:
pct>=60?“✅ Pass achieved! Keep reviewing weak areas.”:
“📚 Below 60% — review explanations and retry. Focus on topics you found hardest.”;
}
}
}

function updateBar(){
document.getElementById(“score-display”).textContent=
`Score: ${correct} / ${answered} answered · ${QUESTIONS.length-answered} remaining`;
document.getElementById(“progress-bar”).style.width=(answered/QUESTIONS.length*100)+”%”;
}

function revealAll(){
QUESTIONS.forEach((_,i)=>revealed.add(i));
render(currentFilter);
}

function resetAll(){
revealed.clear();
Object.keys(userAnswers).forEach(k=>delete userAnswers[k]);
answered=0;correct=0;
const sum=document.getElementById(“summary”);
if(sum)sum.style.display=“none”;
render(currentFilter);
}

function filterTopic(t,btn){
currentFilter=t;
document.querySelectorAll(”.topic-btn”).forEach(b=>b.classList.remove(“active”));
btn.classList.add(“active”);
render(t);
}

document.addEventListener(“DOMContentLoaded”,()=>{
const wrap=document.getElementById(“main-content”);
const sum=document.createElement(“div”);
sum.id=“summary”;
sum.innerHTML=`<h2>Quiz Complete</h2> <div class="final-score">0/150</div> <div class="grade-msg"></div> <p style="color:var(--ivory-dim);margin-bottom:1.5rem">Review the explanations on any question you found difficult, then use the Reset button to attempt it again.</p> <button id="restart-btn" onclick="resetAll()">↺ Reset &amp; Try Again</button>`;
wrap.appendChild(sum);
render(“all”);
});
</script>

</body>
</html>
